<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>シフト希望入力</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
  :root {
    --green: #00B900; --green-dark: #009900;
    --bg: #F0F4F0; --card: #FFFFFF;
    --text: #1a1a1a; --text-muted: #888;
    --border: #E0E8E0; --shadow: 0 2px 12px rgba(0,185,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 120px; }
  .header { background: var(--green); padding: 16px 20px 20px; color: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,185,0,0.3); }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .header-icon { width: 32px; height: 32px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header h1 { font-size: 17px; font-weight: 900; }
  .header-sub { font-size: 11px; opacity: 0.8; margin-left: 42px; }
  .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--card); border-bottom: 1px solid var(--border); }
  .month-nav button { width: 36px; height: 36px; border: 1px solid var(--border); background: var(--bg); border-radius: 8px; font-size: 16px; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; }
  .month-title { font-size: 17px; font-weight: 700; }
  .staff-section { padding: 14px 16px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .staff-label { font-size: 13px; font-weight: 700; color: var(--text-muted); white-space: nowrap; }
  .deadline-banner { padding: 10px 16px; background: #FEF3C7; border-bottom: 1px solid #FDE68A; font-size: 12px; font-weight: 700; color: #92400E; text-align: center; }
  .deadline-banner.closed { background: #FEE2E2; border-color: #FCA5A5; color: #991B1B; }
  .shift-selector { padding: 14px 16px; background: var(--card); border-bottom: 2px solid var(--border); }
  .shift-selector-label { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px; }
  .shift-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .shift-btn { padding: 10px 4px; border: 2px solid var(--border); background: var(--bg); border-radius: 10px; font-size: 12px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; text-align: center; transition: all 0.15s; color: var(--text-muted); }
  .shift-btn .shift-icon { font-size: 18px; display: block; margin-bottom: 3px; }
  .shift-btn .shift-name { display: block; font-size: 11px; }
  .shift-btn .shift-time { display: block; font-size: 9px; opacity: 0.7; margin-top: 1px; }
  .shift-btn.active { border-color: currentColor; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .shift-btn[data-shift="early"].active { color: #F59E0B; border-color: #F59E0B; background: #FFFBEB; }
  .shift-btn[data-shift="clean"].active { color: #10B981; border-color: #10B981; background: #ECFDF5; }
  .shift-btn[data-shift="front"].active { color: #3B82F6; border-color: #3B82F6; background: #EFF6FF; }
  .shift-btn[data-shift="off"].active   { color: #EF4444; border-color: #EF4444; background: #FEF2F2; }
  .calendar-wrap { padding: 16px; }
  .calendar { background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
  .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--green); }
  .cal-dow { padding: 8px 0; text-align: center; font-size: 11px; font-weight: 700; color: white; opacity: 0.9; }
  .calendar-body { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); }
  .cal-day { background: var(--card); aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; min-height: 46px; transition: all 0.12s; }
  .cal-day.empty { background: var(--bg); cursor: default; }
  .cal-day.past  { opacity: 0.35; cursor: not-allowed; }
  .cal-day.today .day-num { background: var(--green); color: white !important; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .day-num { font-size: 13px; font-weight: 700; line-height: 1; }
  .cal-day.sun .day-num { color: #EF4444; }
  .cal-day.sat .day-num { color: #3B82F6; }
  .day-shift { font-size: 7px; font-weight: 800; margin-top: 2px; padding: 1px 3px; border-radius: 4px; line-height: 1.4; text-align: center; }
  .cal-day.selected-early { background: #FFFBEB; }
  .cal-day.selected-clean { background: #ECFDF5; }
  .cal-day.selected-front { background: #EFF6FF; }
  .cal-day.selected-off   { background: #FEF2F2; }
  .day-shift.early { background: #FEF3C7; color: #92400E; }
  .day-shift.clean { background: #D1FAE5; color: #065F46; }
  .day-shift.front { background: #DBEAFE; color: #1E40AF; }
  .day-shift.off   { background: #FEE2E2; color: #991B1B; }
  .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: flex-end; justify-content: center; z-index: 500; }
  .popup-overlay.show { display: flex; }
  .popup { background: var(--card); border-radius: 20px 20px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 480px; box-shadow: 0 -4px 24px rgba(0,0,0,0.15); animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .popup-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .popup-title { font-size: 16px; font-weight: 900; margin-bottom: 4px; }
  .popup-date  { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .popup-time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .popup-time-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
  .popup-time-group input[type="time"] {
    width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px;
    font-size: 16px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg); color: var(--text); outline: none; text-align: center;
    -webkit-appearance: none; appearance: none;
  }
  .popup-time-group input[type="time"]:focus { border-color: #3B82F6; }
  .popup-preview { background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; font-size: 13px; color: #1E40AF; font-weight: 700; text-align: center; white-space: pre-line; }
  .popup-preview.error { background: #FEF2F2; border-color: #FCA5A5; color: #EF4444; }
  .popup-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .popup-cancel  { padding: 14px; border: 2px solid var(--border); background: var(--bg); border-radius: 12px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; color: var(--text-muted); }
  .popup-confirm { padding: 14px; border: none; background: #3B82F6; border-radius: 12px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; color: white; }
  .popup-delete  { width: 100%; padding: 12px; border: none; background: #FEF2F2; border-radius: 12px; font-size: 13px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; color: #EF4444; margin-top: 8px; }
  .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px; background: rgba(240,244,240,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); }
  .submit-btn { width: 100%; padding: 16px; background: var(--green); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 900; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .submit-btn:disabled { background: #CCC; cursor: not-allowed; }
  .submit-btn .count-badge { background: rgba(255,255,255,0.3); border-radius: 20px; padding: 2px 10px; font-size: 13px; }
  .success-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 24px; text-align: center; }
  .success-screen.show { display: flex; }
  .success-icon  { width: 80px; height: 80px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 20px; }
  .success-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; color: var(--green-dark); }
  .success-sub   { font-size: 14px; color: var(--text-muted); line-height: 1.7; margin-bottom: 32px; }
  .success-list  { background: var(--card); border-radius: 14px; padding: 16px; width: 100%; max-width: 320px; text-align: left; margin-bottom: 24px; }
  .success-list-title { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px; }
  .success-list-item  { font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .success-list-item:last-child { border-bottom: none; }
  .success-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; }
  .close-btn { padding: 14px; background: var(--green); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; }
  .reset-btn { padding: 14px; background: white; color: var(--green-dark); border: 2px solid var(--green); border-radius: 12px; font-size: 15px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; }
  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 1000; }
  .loading-overlay.show { display: flex; }
  .spinner { width: 44px; height: 44px; border: 4px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; font-weight: 700; color: var(--text-muted); }
</style>
</head>
<body>

<div id="debug-log" style="position:fixed;bottom:130px;left:0;right:0;background:rgba(0,0,0,0.85);color:#00FF88;font-size:10px;padding:8px;max-height:120px;overflow-y:auto;z-index:9999;font-family:monospace;display:none"></div>

<div id="main-screen">
  <div class="header">
    <div class="header-top">
      <div class="header-icon">🏨</div>
      <h1>シフト希望入力</h1>
    </div>
    <div class="header-sub">希望日をカレンダーで選んで送信してください</div>
  </div>
  <div id="deadline-banner" class="deadline-banner" style="display:none"></div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div class="month-title" id="month-title"></div>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="staff-section">
    <div class="staff-label">名前</div>
    <div id="staff-name" style="font-size:15px;font-weight:700;">読み込み中...</div>
  </div>
  <div class="shift-selector">
    <div class="shift-selector-label">シフト種別を選んでからカレンダーをタップ</div>
    <div class="shift-buttons">
      <button class="shift-btn active" data-shift="early" onclick="selectShift('early')">
        <span class="shift-icon">🌅</span><span class="shift-name">早朝</span><span class="shift-time">5:30〜9:00</span>
      </button>
      <button class="shift-btn" data-shift="clean" onclick="selectShift('clean')">
        <span class="shift-icon">🧹</span><span class="shift-name">清掃</span><span class="shift-time">10:00〜15:00</span>
      </button>
      <button class="shift-btn" data-shift="front" onclick="selectShift('front')">
        <span class="shift-icon">🛎️</span><span class="shift-name">変則</span><span class="shift-time" id="front-time-label">時間設定あり</span>
      </button>
      <button class="shift-btn" data-shift="off" onclick="selectShift('off')">
        <span class="shift-icon">🌙</span><span class="shift-name">休み希望</span><span class="shift-time">—</span>
      </button>
    </div>
  </div>
  <div class="calendar-wrap">
    <div class="calendar">
      <div class="calendar-header">
        <div class="cal-dow">日</div><div class="cal-dow">月</div><div class="cal-dow">火</div>
        <div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div><div class="cal-dow">土</div>
      </div>
      <div class="calendar-body" id="calendar-body"></div>
    </div>
  </div>
</div>

<!-- 変則シフト時間設定ポップアップ -->
<div class="popup-overlay" id="popup-overlay" onclick="closePopup(event)">
  <div class="popup" onclick="event.stopPropagation()">
    <div class="popup-handle"></div>
    <div class="popup-title">変則シフト 時間設定</div>
    <div class="popup-date" id="popup-date"></div>
    <div class="popup-time-row">
      <div class="popup-time-group">
        <label>開始時間</label>
        <input type="time" id="popup-start" value="05:30" oninput="updatePreview()">
      </div>
      <div class="popup-time-group">
        <label>終了時間</label>
        <input type="time" id="popup-end" value="09:00" oninput="updatePreview()">
      </div>
    </div>
    <div class="popup-preview" id="popup-preview"></div>
    <div class="popup-buttons">
      <button class="popup-cancel"  onclick="cancelPopup()">キャンセル</button>
      <button class="popup-confirm" onclick="confirmPopup()">この時間で登録</button>
    </div>
    <button class="popup-delete" id="popup-delete" onclick="deleteDay()" style="display:none">この日のシフトを削除</button>
  </div>
</div>

<div class="success-screen" id="success-screen">
  <div class="success-icon">✅</div>
  <div class="success-title">送信完了！</div>
  <div class="success-sub">シフト希望を受け付けました。<br>管理者が確認後、シフト表に反映されます。</div>
  <div class="success-list" id="success-list"></div>
  <div class="success-buttons">
    <button class="reset-btn" onclick="resetForm()">別の月を入力する</button>
    <button class="close-btn" onclick="closeLiff()">閉じる</button>
  </div>
</div>

<div class="submit-bar" id="submit-bar">
  <button class="submit-btn" id="submit-btn" onclick="submitRequests()" disabled>シフト希望を送信</button>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">送信中...</div>
</div>

<script>
var GAS_URL = "https://script.google.com/macros/s/AKfycbyXqb62-YkWuC0_zJZEJFCUsQRUStCFbsQ-vUiNAd7StgMGKMnR3XJZx8gYQa-mdLTG/exec";
var LIFF_ID = "2010102219-fwHhQc8S";

// shiftTypeの文字列→shiftIdへの変換マップ
var SHIFT_LABEL_TO_ID = {
  "早朝": "early",
  "清掃": "clean",
  "変則": "front",
  "休み希望": "off"
};

var SHIFTS = {
  early: { label: "早朝",     startMin: 330,  endMin: 540,  color: "#F59E0B" },
  clean: { label: "清掃",     startMin: 600,  endMin: 900,  color: "#10B981" },
  front: { label: "変則",     startMin: 330,  endMin: 1380, color: "#3B82F6" },
  off:   { label: "休み希望", startMin: 0,    endMin: 0,    color: "#EF4444" }
};

var DOW_JP        = ["日","月","火","水","木","金","土"];
// 【修正1】初期表示を翌月に
var _now          = new Date();
var currentYear   = _now.getMonth() === 11 ? _now.getFullYear() + 1 : _now.getFullYear();
var currentMonth  = _now.getMonth() === 11 ? 1 : _now.getMonth() + 2;

var selectedShift    = "early";
var selections       = {};
var currentStaff     = null;
var popupDateKey     = null;
var isAccepting      = true;  // 締め切り状態
// 【修正2】変則シフトの確定時間（初回設定後に保持）
var frontTimeSet     = false; // 変則時間が設定済みかどうか

// ── ユーティリティ ────────────────────────────────────────
function minToStr(min) {
  var h = Math.floor(min / 60);
  var m = min % 60;
  return h + ":" + (m === 0 ? "00" : String(m).padStart(2, "0"));
}

function timeStrToMin(str) {
  if (!str) return null;
  var parts = str.split(":");
  return parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
}

function minToTimeInput(min) {
  var h = Math.floor(min / 60);
  var m = min % 60;
  return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
}

function isTodayOrFuture(year, month, day) {
  var t = new Date();
  if (year > t.getFullYear()) return true;
  if (year === t.getFullYear() && month > t.getMonth() + 1) return true;
  if (year === t.getFullYear() && month === t.getMonth() + 1 && day >= t.getDate()) return true;
  return false;
}

function isToday(year, month, day) {
  var t = new Date();
  return year === t.getFullYear() && month === t.getMonth() + 1 && day === t.getDate();
}

// 【修正2】変則ボタンのラベルを更新
function updateFrontLabel() {
  var label = document.getElementById("front-time-label");
  if (frontTimeSet) {
    label.textContent = minToStr(SHIFTS.front.startMin) + "〜" + minToStr(SHIFTS.front.endMin);
  } else {
    label.textContent = "時間設定あり";
  }
}

function debugLog(msg) {
  var el = document.getElementById("debug-log");
  el.style.display = "block";
  el.innerHTML += msg + "<br>";
  el.scrollTop = el.scrollHeight;
}

// ── LIFF初期化 ────────────────────────────────────────────
function initLiff() {
  liff.init({ liffId: LIFF_ID }).then(function() {
    debugLog("LIFF起動OK");
    if (liff.isLoggedIn()) {
      debugLog("ログイン済み→スタッフ取得");
      loadStaffByIdToken(liff.getIDToken());
    } else {
      debugLog("未ログイン→login()");
      liff.login();
    }
  }).catch(function(e) {
    debugLog("LIFF初期化エラー:" + e);
    currentStaff = { id: "preview", name: "プレビューモード", position: "" };
    document.getElementById("staff-name").textContent = "プレビューモード";
    renderCalendar();
  });
}

function loadStaffByIdToken(idToken) {
  fetch(GAS_URL + "?action=getStaff&idToken=" + encodeURIComponent(idToken))
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) {
        liff.getProfile().then(function(p) {
          currentStaff = { id: p.userId, name: p.displayName, position: "" };
          document.getElementById("staff-name").textContent = p.displayName;
          updateSubmitBtn();
          renderCalendar();
        });
        return;
      }

      currentStaff = data;
      document.getElementById("staff-name").textContent =
        data.name + (data.position ? "（" + data.position + "）" : "");

      // 締め切り状態を表示
      isAccepting = data.isAccepting !== false;
      var banner  = document.getElementById("deadline-banner");
      if (!isAccepting) {
        banner.style.display = "block";
        banner.className     = "deadline-banner closed";
        banner.textContent   = "今月の提出期限は終了しました";
      } else if (data.deadlineDay) {
        banner.style.display = "block";
        banner.className     = "deadline-banner";
        banner.textContent   = "提出期限：毎月" + data.deadlineDay + "日まで";
      }

      // 【修正3】前回提出データを復元
      if (data.previousData && data.previousData.length > 0) {
        restorePreviousData(data.previousData);
      }

      updateSubmitBtn();
      renderCalendar();
    })
    .catch(function() {
      liff.getProfile().then(function(p) {
        currentStaff = { id: p.userId, name: p.displayName, position: "" };
        document.getElementById("staff-name").textContent = p.displayName;
        updateSubmitBtn();
        renderCalendar();
      });
    });
}

// 【修正3】前回データをselectionsに復元
function restorePreviousData(previousData) {
  previousData.forEach(function(row) {
    var shiftId = SHIFT_LABEL_TO_ID[row.shiftType];
    if (!shiftId) return;

    var startMin = timeStrToMin(row.startTime);
    var endMin   = timeStrToMin(row.endTime);

    // 変則シフトの場合、保持時間も更新
    if (shiftId === "front" && startMin !== null && endMin !== null) {
      SHIFTS.front.startMin = startMin;
      SHIFTS.front.endMin   = endMin;
      frontTimeSet          = true;
      updateFrontLabel();
    }

    selections[row.date] = {
      shiftId:   shiftId,
      startMin:  startMin !== null ? startMin : SHIFTS[shiftId].startMin,
      endMin:    endMin   !== null ? endMin   : SHIFTS[shiftId].endMin,
      startTime: row.startTime,
      endTime:   row.endTime
    };
  });
}

// ── 月変更 ────────────────────────────────────────────────
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1;  currentYear++; }
  if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
  renderCalendar();
}

function selectShift(shiftId) {
  selectedShift = shiftId;
  document.querySelectorAll(".shift-btn").forEach(function(b) { b.classList.remove("active"); });
  document.querySelector("[data-shift='" + shiftId + "']").classList.add("active");
}

// ── カレンダー描画 ────────────────────────────────────────
function renderCalendar() {
  document.getElementById("month-title").textContent = currentYear + "年 " + currentMonth + "月";
  var body     = document.getElementById("calendar-body");
  var firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
  var lastDate = new Date(currentYear, currentMonth, 0).getDate();
  body.innerHTML = "";

  for (var i = 0; i < firstDay; i++) {
    var empty = document.createElement("div");
    empty.className = "cal-day empty";
    body.appendChild(empty);
  }

  for (var d = 1; d <= lastDate; d++) {
    var dow     = new Date(currentYear, currentMonth - 1, d).getDay();
    var mm      = String(currentMonth).padStart(2, "0");
    var dd      = String(d).padStart(2, "0");
    var dateKey = currentYear + "-" + mm + "-" + dd;
    var isPast  = !isTodayOrFuture(currentYear, currentMonth, d);
    var today   = isToday(currentYear, currentMonth, d);
    var sel     = selections[dateKey];

    var el  = document.createElement("div");
    var cls = "cal-day";
    if (dow === 0) cls += " sun";
    if (dow === 6) cls += " sat";
    if (isPast)    cls += " past";
    if (today)     cls += " today";
    if (sel)       cls += " selected-" + sel.shiftId;
    el.className = cls;

    var shiftLabel = "";
    if (sel) {
      if (sel.shiftId === "front") {
        shiftLabel = "<div class='day-shift front'>" + minToStr(sel.startMin) + "<br>" + minToStr(sel.endMin) + "</div>";
      } else if (sel.shiftId === "off") {
        shiftLabel = "<div class='day-shift off'>休み希望</div>";
      } else {
        shiftLabel = "<div class='day-shift " + sel.shiftId + "'>" + SHIFTS[sel.shiftId].label + "</div>";
      }
    }
    el.innerHTML = "<div class='day-num'>" + d + "</div>" + shiftLabel;

    if (!isPast && isAccepting) {
      (function(key) {
        el.addEventListener("click", function() { handleDayClick(key); });
      })(dateKey);
    }
    body.appendChild(el);
  }
}

// ── 日付タップ処理 ────────────────────────────────────────
function handleDayClick(dateKey) {
  if (selectedShift === "front") {
    // 【修正2】変則：既存データがある場合またはタップ済み日はポップアップ
    // 初回かつ時間未設定の場合もポップアップ
    if (!frontTimeSet || (selections[dateKey] && selections[dateKey].shiftId === "front")) {
      openPopup(dateKey);
    } else {
      // 時間設定済み → スタンプ入力
      if (selections[dateKey] && selections[dateKey].shiftId === "front") {
        delete selections[dateKey];
      } else {
        selections[dateKey] = {
          shiftId:   "front",
          startMin:  SHIFTS.front.startMin,
          endMin:    SHIFTS.front.endMin,
          startTime: minToStr(SHIFTS.front.startMin),
          endTime:   minToStr(SHIFTS.front.endMin)
        };
      }
      renderCalendar();
      updateSubmitBtn();
    }
  } else {
    if (selections[dateKey] && selections[dateKey].shiftId === selectedShift) {
      delete selections[dateKey];
    } else {
      var sh = SHIFTS[selectedShift];
      selections[dateKey] = {
        shiftId:   selectedShift,
        startMin:  sh.startMin,
        endMin:    sh.endMin,
        startTime: minToStr(sh.startMin),
        endTime:   minToStr(sh.endMin)
      };
    }
    renderCalendar();
    updateSubmitBtn();
  }
}

// ── ポップアップ ──────────────────────────────────────────
function openPopup(dateKey) {
  popupDateKey  = dateKey;
  var parts     = dateKey.split("-");
  var dow       = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2])).getDay();
  document.getElementById("popup-date").textContent =
    parseInt(parts[1]) + "月" + parseInt(parts[2]) + "日（" + DOW_JP[dow] + "）";

  var existing = selections[dateKey];
  if (existing && existing.shiftId === "front") {
    document.getElementById("popup-start").value = minToTimeInput(existing.startMin);
    document.getElementById("popup-end").value   = minToTimeInput(existing.endMin);
    document.getElementById("popup-delete").style.display = "block";
  } else {
    document.getElementById("popup-start").value = minToTimeInput(SHIFTS.front.startMin);
    document.getElementById("popup-end").value   = minToTimeInput(SHIFTS.front.endMin);
    document.getElementById("popup-delete").style.display = "none";
  }

  updatePreview();
  document.getElementById("popup-overlay").classList.add("show");
}

function updatePreview() {
  var startVal = document.getElementById("popup-start").value;
  var endVal   = document.getElementById("popup-end").value;
  var preview  = document.getElementById("popup-preview");

  if (!startVal || !endVal) {
    preview.textContent = "時間を選択してください";
    preview.className   = "popup-preview error";
    return;
  }

  var startMin   = timeStrToMin(startVal);
  var endMin     = timeStrToMin(endVal);

  if (endMin <= startMin) {
    preview.textContent = "終了時間は開始時間より後にしてください";
    preview.className   = "popup-preview error";
    return;
  }

  var totalHours = (endMin - startMin) / 60;
  var text;
  if (totalHours > 6) {
    text = minToStr(startMin) + "〜" + minToStr(endMin) + "\n" +
           "拘束 " + totalHours.toFixed(1) + "時間（実働 " + (totalHours - 1).toFixed(1) + "時間 + 休憩60分）";
  } else {
    text = minToStr(startMin) + "〜" + minToStr(endMin) + "（" + totalHours.toFixed(1) + "時間）";
  }

  preview.textContent = text;
  preview.className   = "popup-preview";
}

function confirmPopup() {
  var startVal = document.getElementById("popup-start").value;
  var endVal   = document.getElementById("popup-end").value;
  if (!startVal || !endVal) return;

  var startMin = timeStrToMin(startVal);
  var endMin   = timeStrToMin(endVal);
  if (endMin <= startMin) return;

  // 【修正2】SHIFTSに時間を保持してスタンプ化
  SHIFTS.front.startMin = startMin;
  SHIFTS.front.endMin   = endMin;
  frontTimeSet          = true;
  updateFrontLabel();

  selections[popupDateKey] = {
    shiftId:   "front",
    startMin:  startMin,
    endMin:    endMin,
    startTime: minToStr(startMin),
    endTime:   minToStr(endMin)
  };

  document.getElementById("popup-overlay").classList.remove("show");
  renderCalendar();
  updateSubmitBtn();
}

function cancelPopup() {
  document.getElementById("popup-overlay").classList.remove("show");
}

function closePopup(event) {
  if (event.target === document.getElementById("popup-overlay")) {
    document.getElementById("popup-overlay").classList.remove("show");
  }
}

function deleteDay() {
  delete selections[popupDateKey];
  document.getElementById("popup-overlay").classList.remove("show");
  renderCalendar();
  updateSubmitBtn();
}

// ── 送信ボタン更新 ────────────────────────────────────────
function updateSubmitBtn() {
  var btn   = document.getElementById("submit-btn");
  var count = Object.keys(selections).length;
  var ok    = currentStaff && count > 0 && isAccepting;
  btn.disabled = !ok;
  if (!isAccepting) {
    btn.innerHTML = "提出期限が終了しました";
  } else {
    btn.innerHTML = ok
      ? "シフト希望を送信 <span class='count-badge'>" + count + "件</span>"
      : "シフト希望を送信（日付を選択してください）";
  }
}

// ── 送信処理 ──────────────────────────────────────────────
function submitRequests() {
  if (!currentStaff || !isAccepting) return;
  var keys = Object.keys(selections).sort();
  if (keys.length === 0) return;

  document.getElementById("loading").classList.add("show");

  var idToken = liff.getIDToken();
  debugLog("送信開始 件数:" + keys.length + " token:" + (idToken ? "あり" : "なし"));
  var rows    = keys.map(function(key) {
    var sel = selections[key];
    return {
      receivedAt: new Date().toISOString(),
      staffId:    currentStaff.id,
      name:       currentStaff.name,
      date:       key,
      shiftType:  SHIFTS[sel.shiftId].label,
      startTime:  sel.startTime,
      endTime:    sel.endTime,
      status:     "未確認"
    };
  });

  fetch(GAS_URL, {
    method:  "POST",
    headers: { "Content-Type": "text/plain" },
    body:    JSON.stringify({ type: "shiftRequests", idToken: idToken, rows: rows })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    debugLog("レスポンス:" + JSON.stringify(data));
    document.getElementById("loading").classList.remove("show");
    if (data.result === "success") {
      showSuccess(currentStaff.name, keys);
      if (liff.isInClient()) {
        liff.sendMessages([{
          type: "text",
          text: "【シフト希望送信完了】\n" + currentStaff.name + "\n" +
            keys.map(function(k) {
              var p   = k.split("-");
              var sel = selections[k];
              return parseInt(p[1]) + "/" + parseInt(p[2]) + " " +
                SHIFTS[sel.shiftId].label + " " + sel.startTime + "〜" + sel.endTime;
            }).join("\n")
        }]).catch(function() {});
      }
    } else {
      alert("送信に失敗しました：" + (data.message || "不明なエラー"));
    }
  })
  .catch(function(e) {
    debugLog("fetchエラー:" + e);
    document.getElementById("loading").classList.remove("show");
    alert("送信エラーが発生しました。再度お試しください。");
    console.log("送信エラー:", e);
  });
}

function showSuccess(staffName, keys) {
  var html = keys.map(function(key) {
    var p   = key.split("-");
    var dow = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2])).getDay();
    var sel = selections[key];
    var sh  = SHIFTS[sel.shiftId];
    return "<div class='success-list-item'>" +
      "<span>" + parseInt(p[1]) + "月" + parseInt(p[2]) + "日（" + DOW_JP[dow] + "）</span>" +
      "<span style='color:" + sh.color + ";font-weight:700'>" + sh.label + " " + sel.startTime + "〜" + sel.endTime + "</span>" +
      "</div>";
  }).join("");

  document.getElementById("success-list").innerHTML =
    "<div class='success-list-title'>" + staffName + "さんの送信内容</div>" + html;
  document.getElementById("main-screen").style.display = "none";
  document.getElementById("submit-bar").style.display  = "none";
  document.getElementById("success-screen").classList.add("show");
}

function resetForm() {
  selections   = {};
  frontTimeSet = false;
  updateFrontLabel();
  document.getElementById("success-screen").classList.remove("show");
  document.getElementById("main-screen").style.display = "block";
  document.getElementById("submit-bar").style.display  = "block";
  updateSubmitBtn();
  renderCalendar();
  window.scrollTo(0, 0);
}

function closeLiff() {
  if (liff.isInClient()) liff.closeWindow();
  else window.close();
}

initLiff();
</script>
</body>
</html>
